<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SportStock - Acceso</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: #fff;
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; color: #334155;
        }
        h2 { margin-bottom: 10px; color: #1e293b; text-align: center; }
        p { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 25px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; 
            transition: border 0.3s;
        }
        input:focus { border-color: #2563eb; outline: none; }
        button { 
            width: 100%; padding: 12px; background: #2563eb; color: white; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-size: 16px; font-weight: bold; transition: background 0.3s;
        }
        button:hover { background: #1d4ed8; }
        .error-msg { 
            color: #dc2626; font-size: 13px; text-align: center; 
            margin-top: 15px; display: none; background: #fee2e2;
            padding: 8px; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>SportStock 🏅</h2>
        <p>Panel de Administración</p>
        
        <label>Usuario</label>
        <input type="text" id="user" placeholder="Usuario" required>
        
        <label>Contraseña</label>
        <input type="password" id="pass" placeholder="Contraseña" required>
        
        <button onclick="login()">Entrar</button>
        <p id="error" class="error-msg"> Usuario o clave incorrectos</p>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'Nicolas' && p === '123') {
                localStorage.setItem('auth', 'true');
                window.location.href = 'inventario.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
